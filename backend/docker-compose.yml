services:
  db:
    image: mysql:8.0
    container_name: orchard_database
    ports:
      - "3306:3306"
    restart: always
    environment:
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_ROOT_PASSWORD: ${DB_PASS}
    volumes:
      - mysqldata:/var/lib/mysql
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
  backend:
    build: .
    container_name: orchard_backend
    restart: always
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DATABASE_URL: ${DATABASE_URL}
      NODE_ENV: ${NODE_ENV}
    command: npm start
    env_file: .env

volumes:
  mysqldata:
